<div id="[[.ID]]" class="step-flow-editor">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Vue.js 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>[[.CSS]]</style>

    <div id="app-[[.ID]]" v-cloak>
        <div class="EditorRoot">
            <!-- Header -->
            <div class="EditorHeader">
                <div class="d-flex align-items-center">
                    <i class="bi bi-diagram-3-fill text-primary me-2 fs-4"></i>
                    <h5 class="mb-0">Step Flow Editor</h5>
                </div>
                <div>
                    <button @click="saveFlow" class="btn btn-primary btn-sm" :disabled="saving">
                        <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>
                        <i v-else class="bi bi-cloud-arrow-up-fill me-1"></i>
                        Publish Flow
                    </button>
                </div>
            </div>

            <div class="EditorBody">
                <!-- Sidebar: Toolbox -->
                <div class="Toolbox">
                    <div class="ToolboxHeader">
                        <h6 class="mb-0">Steps</h6>
                        <small class="text-muted">Drag or click to add</small>
                    </div>
                    <div class="p-0">
                        <div v-for="def in stepDefinitions" :key="def.type"
                            class="StepLibraryItem" @click="addStep(def)">
                            <div class="d-flex align-items-center">
                                <div class="me-3 fs-5">
                                    <i :class="def.icon"></i>
                                </div>
                                <div>
                                    <div class="fw-bold small">{{ def.title }}</div>
                                    <div class="text-muted" style="font-size: 0.7rem;">{{ def.description }}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Canvas -->
                <div class="Canvas" @click="selectedStepPath = null">
                    <div v-if="flow.length === 0" class="text-center mt-5 text-muted">
                        <i class="bi bi-plus-circle fs-1 mb-2 d-block"></i>
                        <p>Your flow is empty.<br>Add your first step from the sidebar.</p>
                    </div>

                    <template v-for="(step, idx) in flow" :key="step.id">
                        <step-node
                            :step="step"
                            :path="[idx]"
                            :selected-path="selectedStepPath"
                            :step-definitions="stepDefinitions"
                            @select="selectStep"
                            @remove="removeStep"
                            @add-to-branch="addStepToBranch"
                        ></step-node>
                        <div v-if="idx < flow.length - 1" class="ConnectorV"></div>
                    </template>
                </div>

                <!-- Settings Panel -->
                <div class="SettingsPanel">
                    <div v-if="selectedStep">
                        <h6 class="mb-3 border-bottom pb-2">Step Settings</h6>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Step Title</label>
                            <input v-model="selectedStep.title" class="form-control form-control-sm">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Step Type</label>
                            <input :value="selectedStep.type" class="form-control form-control-sm" readonly disabled>
                        </div>

                        <div v-if="Object.keys(selectedStep.data).length > 0">
                            <label class="form-label small fw-bold d-block mt-4 border-bottom pb-1">Configuration</label>
                            <div v-for="(val, key) in selectedStep.data" :key="key" class="mb-2">
                                <label class="form-label x-small text-muted mb-1 text-capitalize">{{ key }}</label>
                                <input v-model="selectedStep.data[key]" class="form-control form-control-sm">
                            </div>
                        </div>
                    </div>
                    <div v-else class="h-100 d-flex align-items-center justify-content-center text-muted text-center p-4">
                        <small>Select a step on the canvas to configure its properties.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window["editorData_[[.ID]]"] = {
            flow: [[.FlowJSON]],
            stepDefinitions: [[.StepDefinitions]]
        };
        (function() {
            [[.JS]]
        })();
    </script>
</div>
